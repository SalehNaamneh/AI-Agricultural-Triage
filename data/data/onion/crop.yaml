#   1. Add a folder under images/ with images
#   2. Add an entry here (csv_key: null if no CSV data yet)
#   3. Add a row to disease_csv and spray_csv (optional)
#   4. Re-run Layer3/RAG/ingest.py to update the knowledge base
#   5. Re-run Layer3/ImageAnalyzer/train.py --crop onion to retrain model

