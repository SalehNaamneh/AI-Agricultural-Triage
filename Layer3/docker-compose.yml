version: "3.9"

services:

  rag:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: agritriage-rag
    ports:
      - "8000:8000"
    volumes:
      - ./RAG/chroma_db:/app/chroma_db
      - ../data:/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  image-analyzer:
    build:
      context: ./ImageAnalyzer
      dockerfile: Dockerfile
    container_name: agritriage-image-analyzer
    ports:
      - "8002:8002"
    volumes:
      # Mount trained weights at runtime (not baked into image)
      - ./ImageAnalyzer/best_model.pth:/app/best_model.pth:ro
      - ../data:/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
