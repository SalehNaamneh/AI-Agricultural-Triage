version: "3.9"

services:

  rag:
    build:
      context: ..                          # project root — gives Dockerfile access to crop_config.py
      dockerfile: Layer3/RAG/Dockerfile
    container_name: agritriage-rag
    ports:
      - "8000:8000"
    volumes:
      # ChromaDB persisted index (rebuilt automatically on first run if empty)
      - ./RAG/chroma_db:/workspace/Layer3/RAG/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach Ollama on host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  image-analyzer:
    build:
      context: ..                          # project root
      dockerfile: Layer3/ImageAnalyzer/Dockerfile
    container_name: agritriage-image-analyzer
    ports:
      - "8002:8002"
    volumes:
      # Trained model weights (not baked in; update without rebuilding the image)
      - ./ImageAnalyzer/models:/workspace/Layer3/ImageAnalyzer/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
