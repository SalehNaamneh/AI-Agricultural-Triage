version: "3.9"

services:

  rag:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: agritriage-rag
    ports:
      - "8000:8000"
    volumes:
      - ./RAG/chroma_db:/app/chroma_db          # persist vector index
      - ../data:/data:ro                         # read-only access to CSVs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Ollama runs on the host — containers reach it via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

